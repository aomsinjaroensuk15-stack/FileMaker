<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Live Canvas | AI Code Gen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code&family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'Fira Code', monospace; }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#020617] text-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Mock Lucide Icons (Since we use CDN)
        const Icon = ({ name, className }) => {
            useEffect(() => { lucide.createIcons(); }, []);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [fileType, setFileType] = useState('.html');
            const [prompt, setPrompt] = useState('');
            const [lineCount, setLineCount] = useState(100);
            const [isGenerating, setIsGenerating] = useState(false);
            const [generatedCode, setGeneratedCode] = useState('');
            const [outputLog, setOutputLog] = useState([]);
            const [activeTab, setActiveTab] = useState('code');
            const [previewContent, setPreviewContent] = useState('');

            const fileOptions = ['.html', '.css', '.js', '.json', '.py', '.csv', '.cmd', '.sql'];

            const addLog = (msg, type = 'info') => {
                const time = new Date().toLocaleTimeString();
                setOutputLog(prev => [{ id: Date.now(), msg, type, time }, ...prev]);
            };

            const generateCode = async () => {
                if (!prompt.trim()) return;
                setIsGenerating(true);
                setGeneratedCode('');
                setActiveTab('code');
                addLog(`กำลังเชื่อมต่อ Gemini เพื่อสร้าง ${fileType}...`, 'info');

                // หมายเหตุ: ในการใช้งานจริงควรใช้ API Key ผ่าน Environment Variable 
                // แต่สำหรับไฟล์สแตนด์อโลนนี้ คุณสามารถใส่ Key ตรงๆ หรือทำช่อง Input รับ Key ได้
                const apiKey = "YOUR_GEMINI_API_KEY"; 

                try {
                    // จำลองการส่งคำสั่ง (ในสภาวะจริงต้องเปลี่ยนเป็น Fetch API ของ Gemini)
                    setTimeout(() => {
                        const mockCode = fileType === '.html' 
                            ? `<!DOCTYPE html>\n<html>\n<head>\n<style>\nbody { background: #f0f2f5; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }\n.card { background: white; padding: 2rem; border-radius: 20px; shadow: 0 10px 15px rgba(0,0,0,0.1); }\n</style>\n</head>\n<body>\n<div class="card">\n  <h1>${prompt}</h1>\n  <p>สร้างโดย Gemini Live Canvas</p>\n</div>\n</body>\n</html>`
                            : `// Generated code for ${prompt}\nconsole.log("Hello from Gemini!");`;
                        
                        setGeneratedCode(mockCode);
                        addLog('สร้างโค้ดสำเร็จ!', 'success');
                        setIsGenerating(false);
                    }, 1500);
                } catch (e) {
                    addLog('เกิดข้อผิดพลาดในการเชื่อมต่อ', 'error');
                    setIsGenerating(false);
                }
            };

            const handleRun = () => {
                if (!generatedCode) return addLog('ไม่มีโค้ดให้รัน', 'error');
                if (fileType === '.html') {
                    setPreviewContent(generatedCode);
                    setActiveTab('preview');
                    addLog('แสดงผลพรีวิว HTML แล้ว', 'success');
                } else {
                    addLog(`[System] กำลังจำลองการรัน ${fileType}...`, 'info');
                }
            };

            return (
                <div className="p-4 md:p-8 max-w-6xl mx-auto">
                    <header className="flex items-center gap-3 mb-8">
                        <div className="bg-indigo-600 p-2 rounded-lg"><Icon name="layers" className="text-white w-6 h-6" /></div>
                        <h1 className="text-2xl font-bold italic tracking-tight">Gemini Canvas <span className="text-indigo-500">Live</span></h1>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                        {/* Control Panel */}
                        <div className="lg:col-span-4 bg-slate-900/50 border border-slate-800 p-5 rounded-2xl space-y-6">
                            <div>
                                <label className="text-[10px] font-bold text-slate-500 uppercase mb-3 block">File Type</label>
                                <div className="grid grid-cols-4 gap-2">
                                    {fileOptions.map(t => (
                                        <button key={t} onClick={() => setFileType(t)} className={`py-2 text-xs font-mono rounded-md border ${fileType === t ? 'bg-indigo-600 border-indigo-400' : 'bg-slate-800 border-slate-700 text-slate-400'}`}>{t}</button>
                                    ))}
                                </div>
                            </div>
                            
                            <div>
                                <label className="text-[10px] font-bold text-slate-500 uppercase mb-2 block">Prompt</label>
                                <textarea value={prompt} onChange={e => setPrompt(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm h-32 focus:border-indigo-500 outline-none" placeholder="อยากสร้างอะไรบอกมาเลย..." />
                            </div>

                            <div>
                                <div className="flex justify-between text-[10px] font-bold text-slate-500 uppercase mb-2">
                                    <span>Lines</span>
                                    <span className="text-indigo-400">{lineCount}</span>
                                </div>
                                <input type="range" min="1" max="1000" value={lineCount} onChange={e => setLineCount(e.target.value)} className="w-full accent-indigo-500" />
                            </div>

                            <button onClick={generateCode} disabled={isGenerating} className="w-full py-3 bg-indigo-600 hover:bg-indigo-500 rounded-xl font-bold flex justify-center items-center gap-2 transition-all active:scale-95 shadow-lg shadow-indigo-900/20">
                                {isGenerating ? <Icon name="refresh-cw" className="animate-spin w-5 h-5" /> : <Icon name="wand-2" className="w-5 h-5" />}
                                {isGenerating ? 'กำลังร่ายมนตร์...' : 'Generate Code'}
                            </button>
                        </div>

                        {/* Display Panel */}
                        <div className="lg:col-span-8 space-y-4">
                            <div className="bg-[#0d1117] border border-slate-800 rounded-2xl overflow-hidden flex flex-col h-[500px] shadow-2xl">
                                <div className="bg-slate-900 p-3 border-b border-slate-800 flex justify-between items-center">
                                    <div className="flex gap-2">
                                        <button onClick={() => setActiveTab('code')} className={`px-4 py-1 rounded text-xs ${activeTab === 'code' ? 'bg-slate-800 text-white' : 'text-slate-500'}`}>Code</button>
                                        <button onClick={() => setActiveTab('preview')} className={`px-4 py-1 rounded text-xs ${activeTab === 'preview' ? 'bg-slate-800 text-white' : 'text-slate-500'}`}>Preview</button>
                                    </div>
                                    <button onClick={handleRun} className="bg-emerald-600 hover:bg-emerald-500 px-4 py-1 rounded text-xs font-bold flex items-center gap-2 transition-all"><Icon name="play" className="w-3 h-3 fill-current" /> RUN</button>
                                </div>
                                <div className="flex-1 overflow-auto">
                                    {activeTab === 'code' ? (
                                        <pre className="p-4 font-mono text-sm text-indigo-200/80 whitespace-pre-wrap">{generatedCode || '// พิมพ์คำสั่งแล้วกด Generate...'}</pre>
                                    ) : (
                                        <iframe srcDoc={previewContent} className="w-full h-full bg-white border-none" sandbox="allow-scripts" />
                                    )}
                                </div>
                            </div>

                            <div className="bg-slate-950 border border-slate-800 rounded-xl h-32 overflow-hidden flex flex-col">
                                <div className="bg-slate-900/50 px-3 py-1 border-b border-slate-800 text-[9px] font-bold text-slate-500 uppercase tracking-widest">Console Output</div>
                                <div className="p-3 font-mono text-[10px] space-y-1 overflow-y-auto">
                                    {outputLog.map(l => (
                                        <div key={l.id} className="flex gap-2">
                                            <span className="text-slate-600">[{l.time}]</span>
                                            <span className={l.type === 'success' ? 'text-emerald-400' : l.type === 'error' ? 'text-rose-400' : 'text-sky-400'}>{l.msg}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
